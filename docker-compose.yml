services:
  db:
    image: postgres:15
    container_name: postgres_container
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../Domus_BackEnd/domus
      dockerfile: Dockerfile
    container_name: backend_container
    restart: no
    depends_on:
      db:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/${POSTGRES_DB}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_JPA_SHOW_SQL=true
      - SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.PostgreSQLDialect
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-3600000}
      - APP_DEMO_PASSWORD=${APP_DEMO_PASSWORD}      
      - APP_ADMIN_PASSWORD=${APP_ADMIN_PASSWORD}    
      - APP_ADMIN_LOGIN=${APP_ADMIN_LOGIN}          
      - STATEMENT_SERVICE_URL=http://extrato:5000   
    ports:
      - "8080:8080"
    env_file:
      - .env

  # ✅ Novo serviço Python
  extrato:
    build:
      context: ../Domus_BackEnd_Py/domus_python
      dockerfile: Dockerfile.python
    container_name: extrato_container
    restart: always
    ports:
      - "5000:5000"

volumes:
  pgdata: